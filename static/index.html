<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Pulse — AI Avatars & Companions Dashboard</title>
  <style>
    :root {
      --bg: #0c0c10;
      --surface: #16161e;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --text: #e4e4f0;
      --muted: #7878a0;
      --accent: #7c6af7;
      --blue: #4fa8e8;
      --orange: #e8824f;
      --yellow: #f5a623;
      --green: #4fe8a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .brand-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .status-dot.loading {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
      animation: pulse 1s infinite;
    }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    .last-updated {
      font-size: 12px;
      color: var(--muted);
    }

    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .refresh-btn:hover:not(:disabled) { background: var(--border); }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    .spin { display: inline-block; }
    .spin.active { animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 18px 32px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-label { font-size: 12px; color: var(--muted); }

    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .pill .cnt {
      background: rgba(0,0,0,0.25);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
    }

    .divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 14px 7px 34px;
      border-radius: 8px;
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── STATS ── */
    .stats {
      padding: 18px 32px 16px;
      display: flex;
      gap: 28px;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 24px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── GRID ── */
    .grid {
      padding: 0 32px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
      gap: 16px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }

    .card.news::before    { background: var(--blue); }
    .card.reddit::before  { background: var(--orange); }
    .card.hackernews::before { background: var(--yellow); }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: rgba(124,106,247,0.4);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .source-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      min-width: 0;
    }

    .source-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .news .dot    { background: var(--blue); }
    .reddit .dot  { background: var(--orange); }
    .hackernews .dot { background: var(--yellow); }

    .source-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .time-ago { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .card-author {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-summary {
      font-size: 13px;
      color: #a0a0be;
      line-height: 1.65;
      flex: 1;
    }

    .card-summary.loading-text {
      color: var(--muted);
      font-style: italic;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .topic-tag {
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .read-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .read-link:hover { color: #fff; }

    /* ── EMPTY / LOADING STATES ── */
    .state-box {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      gap: 16px;
      color: var(--muted);
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .state-box p { font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      header { padding: 14px 16px; }
      .toolbar, .stats, .grid { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
      .search-wrap { display: none; }
      .brand-text p { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🤖</div>
    <div class="brand-text">
      <h1>AI Pulse</h1>
      <p>AI Avatars &amp; Companions Intelligence</p>
    </div>
  </div>
  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <span class="last-updated" id="lastUpdated">Loading…</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
      <span class="spin" id="refreshIcon">↻</span> Refresh
    </button>
  </div>
</header>

<div class="toolbar">
  <span class="filter-label">Show:</span>
  <button class="pill active" onclick="setFilter('all',this)">All <span class="cnt" id="c-all">0</span></button>
  <button class="pill" onclick="setFilter('news',this)">📰 News <span class="cnt" id="c-news">0</span></button>
  <button class="pill" onclick="setFilter('reddit',this)">👾 Reddit <span class="cnt" id="c-reddit">0</span></button>
  <button class="pill" onclick="setFilter('hackernews',this)">🔶 Hacker News <span class="cnt" id="c-hackernews">0</span></button>
  <div class="divider"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search stories…" oninput="render()" />
  </div>
</div>

<div class="stats" id="statsBar">
  <div class="stat">
    <div class="stat-val" id="s-total">—</div>
    <div class="stat-lbl">Stories</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="s-sources">—</div>
    <div class="stat-lbl">Sources</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="s-topics">—</div>
    <div class="stat-lbl">Topics Tracked</div>
  </div>
</div>

<div class="grid" id="grid">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Scanning the web for AI content…</p>
    <p style="font-size:12px">Fetching news, Reddit, Hacker News &amp; generating summaries with Claude</p>
  </div>
</div>

<script>
  let all = [];
  let activeFilter = 'all';

  const TYPE_LABELS = { news:'News', reddit:'Reddit', hackernews:'Hacker News' };

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const s = (Date.now() - d) / 1000;
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  function setFilter(type, btn) {
    activeFilter = type;
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const list = all.filter(a => {
      if (activeFilter !== 'all' && a.type !== activeFilter) return false;
      if (q && !a.title.toLowerCase().includes(q) && !(a.summary||'').toLowerCase().includes(q) && !a.source.toLowerCase().includes(q)) return false;
      return true;
    });

    const grid = document.getElementById('grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="state-box"><p>No stories match this filter.</p></div>';
      return;
    }

    grid.innerHTML = list.map(a => `
      <div class="card ${esc(a.type)}">
        <div class="card-top">
          <span class="source-chip">
            <span class="dot"></span>
            <span class="source-name">${esc(a.source)}</span>
          </span>
          <span class="time-ago">${timeAgo(a.published)}</span>
        </div>
        <div class="card-title">${esc(a.title)}</div>
        <div class="card-author">✍️ ${esc(a.author)}</div>
        <div class="card-summary${a.summary ? '' : ' loading-text'}">${esc(a.summary || 'Generating summary…')}</div>
        <div class="card-footer">
          <span class="topic-tag">${esc(a.query)}</span>
          <a class="read-link" href="${esc(a.url)}" target="_blank" rel="noopener noreferrer">Read full story →</a>
        </div>
      </div>
    `).join('');
  }

  function updateCounts() {
    const n = t => all.filter(a => a.type === t).length;
    document.getElementById('c-all').textContent = all.length;
    document.getElementById('c-news').textContent = n('news');
    document.getElementById('c-reddit').textContent = n('reddit');
    document.getElementById('c-hackernews').textContent = n('hackernews');

    document.getElementById('s-total').textContent = all.length;
    document.getElementById('s-sources').textContent = new Set(all.map(a => a.source)).size;
    document.getElementById('s-topics').textContent = new Set(all.map(a => a.query)).size;
  }

  async function load(force = false) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot loading';

    try {
      const res = await fetch(force ? '/api/articles?force=true' : '/api/articles');
      const data = await res.json();
      all = data.articles || [];

      const ts = data.last_updated
        ? new Date(data.last_updated * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        : '—';
      document.getElementById('lastUpdated').textContent = `Updated ${ts}`;

      updateCounts();
      render();
      dot.className = 'status-dot';
    } catch (e) {
      document.getElementById('grid').innerHTML =
        '<div class="state-box"><p>⚠️ Could not load articles. Check your connection.</p></div>';
      dot.className = 'status-dot';
    }
  }

  async function doRefresh() {
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    icon.classList.add('active');
    await load(true);
    btn.disabled = false;
    icon.classList.remove('active');
  }

  // Initial load
  load();

  // Auto-refresh every 15 min
  setInterval(() => load(), 15 * 60 * 1000);
</script>
</body>
</html>
